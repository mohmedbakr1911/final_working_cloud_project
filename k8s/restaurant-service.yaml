apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
      - name: restaurant-service
        image: food-delivery-cloud_restaurant-service:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgres://user:password@db:5432/food_db"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-service
spec:
  selector:
    app: restaurant-service
  ports:
    - port: 3000
      targetPort: 3000