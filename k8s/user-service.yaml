apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      # FIX: Annotations must be indented under template/metadata
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: user-service
        image: user-service:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@db:5432/food_db"
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  type: NodePort 
  selector:
    app: user-service
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30031