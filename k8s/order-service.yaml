apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: food-delivery-cloud_order-service:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgres://user:password@db:5432/food_db"
        - name: RESTAURANT_SERVICE_URL
          value: "http://restaurant-service:3000"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30003