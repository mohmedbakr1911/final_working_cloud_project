apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: food-delivery-cloud_payment-service:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgres://user:password@db:5432/food_db"
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  type: NodePort
  selector:
    app: payment-service
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30004