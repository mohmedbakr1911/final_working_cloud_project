<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudExpress | Multi-Restaurant Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <nav class="bg-white border-b py-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-10">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-orange-500 text-white rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-cloud"></i>
                </div>
                <span class="text-xl font-black text-gray-900 tracking-tighter">CLOUD EXPRESS</span>
            </div>
            <div class="flex items-center space-x-8 text-xs font-bold uppercase tracking-widest text-gray-500">
                <a href="javascript:void(0)" onclick="showPage('home')" class="hover:text-orange-500">Home</a>
                <a href="javascript:void(0)" id="nav-auth" onclick="showPage('auth')" class="hover:text-orange-500">Login / Register</a>
                <a href="javascript:void(0)" id="nav-admin" class="hidden hover:text-orange-500" onclick="showPage('admin')">Admin Panel</a>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <button onclick="showPage('cart')" class="relative p-2 text-gray-600 hover:text-orange-500">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </button>
            <div id="user-badge" class="hidden flex items-center space-x-4 bg-gray-100 px-4 py-2 rounded-2xl border border-gray-200">
                <span id="display-name" class="text-sm font-bold text-gray-700"></span>
                <button onclick="location.reload()" class="text-gray-400 hover:text-red-500"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <!-- Page: Auth -->
    <main id="page-auth" class="hidden flex-grow flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-xl border">
            <h2 id="auth-title" class="text-3xl font-black text-center mb-8">Sign In</h2>
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Username" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-orange-500 font-medium">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-orange-500 font-medium">
                <button onclick="handleAuth()" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-orange-600 transition-all active:scale-95">CONTINUE</button>
                <p class="text-center text-sm font-bold text-gray-400 mt-6">Need an account? <a href="javascript:void(0)" onclick="toggleAuth()" id="toggle-link" class="text-orange-500">Register</a></p>
            </div>
        </div>
    </main>

    <!-- Page: Marketplace (Home) -->
    <main id="page-home" class="flex-grow max-w-7xl mx-auto w-full p-8">
        <h2 class="text-5xl font-black text-gray-900 mb-12 tracking-tight">Marketplace</h2>
        <div id="restaurant-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </main>

    <!-- Page: Menu -->
    <main id="page-menu" class="hidden flex-grow max-w-7xl mx-auto w-full p-8">
        <button onclick="showPage('home')" class="mb-6 text-orange-500 font-bold flex items-center"><i class="fas fa-arrow-left mr-2"></i> Back</button>
        <h2 id="menu-title" class="text-4xl font-black text-gray-900 mb-8 tracking-tight">Menu</h2>
        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <!-- Page: Cart -->
    <main id="page-cart" class="hidden flex-grow max-w-4xl mx-auto w-full p-8">
        <div class="bg-white rounded-[3rem] p-10 shadow-xl border">
            <h2 class="text-3xl font-black mb-8">Checkout</h2>
            <div id="cart-items" class="space-y-4 mb-10"><script>
                // Render cart items on page load
                renderCart();

            </script></div>
            <div class="flex justify-between items-center border-t pt-6">
                <span class="text-xl font-bold text-gray-400">Total Price</span>
                <span id="cart-total" class="text-3xl font-black text-gray-900">$0.00</span>
            </div>
            <button onclick="checkout()" class="w-full mt-10 bg-black text-white font-black py-5 rounded-2xl shadow-xl transition-all">PLACE ORDER</button>
        </div>
    </main>

    <!-- Page: Admin (Restaurant + Menu Mgmt) -->
    <main id="page-admin" class="hidden flex-grow max-w-4xl mx-auto w-full p-8 space-y-8">
        <!-- Add New Restaurant -->
        <div class="bg-white rounded-[3rem] p-12 shadow-xl border">
            <h2 class="text-2xl font-black mb-6">Create New Restaurant</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input id="admin-res-name" type="text" placeholder="Restaurant Name" class="bg-gray-50 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-orange-500">
                <input id="admin-res-desc" type="text" placeholder="Description" class="bg-gray-50 rounded-2xl p-4 outline-none">
            </div>
            <button onclick="submitNewRestaurant()" class="mt-6 bg-black text-white font-black px-10 py-4 rounded-2xl shadow-lg">REGISTER RESTAURANT</button>
        </div>

        <!-- Add Menu Item -->
        <div class="bg-gray-900 rounded-[3rem] p-12 text-white shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Add Menu Items</h2>
            <div class="space-y-6">
                <select id="admin-res-select" class="w-full bg-gray-800 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-orange-500"></select>
                <div class="grid grid-cols-2 gap-4">
                    <input id="admin-item-name" type="text" placeholder="Item Name" class="bg-gray-800 rounded-2xl p-4 text-white outline-none">
                    <input id="admin-item-price" type="number" placeholder="Price ($)" class="bg-gray-800 rounded-2xl p-4 text-white outline-none">
                </div>
                <button onclick="submitItem()" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg">ADD TO MENU</button>
            </div>
        </div>
    </main>

    <script>
        
        const API = { 
        user: 'http://192.168.49.2:30031', 
        res: 'http://192.168.49.2:30032', 
        order: 'http://192.168.49.2:30033'
        };  


        let isRegister = false;
        let currentUser = null;
        let cart = [];

        function showPage(id) {
            ['auth', 'home', 'admin', 'cart', 'menu'].forEach(p => document.getElementById(`page-${p}`).classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            if (id === 'home') fetchRestaurants();
        }

        async function handleAuth() {
            const username = document.getElementById('auth-user').value;
            const password = document.getElementById('auth-pass').value;
            try {
                const res = await fetch(`${API.user}${isRegister ? '/register' : '/login'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = data;
                    document.getElementById('display-name').innerText = data.username;
                    document.getElementById('user-badge').classList.remove('hidden');
                    document.getElementById('nav-auth').classList.add('hidden');
                    if (data.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
                    showPage('home');
                } else { alert(data.error); }
            } catch (e) { alert("Auth Service Offline"); }
        }

        async function fetchRestaurants() {
            try {
                const res = await fetch(`${API.res}/restaurants`);
                const data = await res.json();
                document.getElementById('restaurant-grid').innerHTML = data.map(r => `
                    <div onclick="openRestaurant(${r.id}, '${r.name}')" class="bg-white p-8 rounded-[2.5rem] border shadow-sm hover:shadow-xl cursor-pointer transition-all">
                        <h3 class="text-2xl font-black text-gray-900">${r.name}</h3>
                        <p class="text-gray-400 font-bold mt-2">${r.description || 'Verified Partner'}</p>
                    </div>
                `).join('');
                document.getElementById('admin-res-select').innerHTML = data.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            } catch(e) { console.error("Marketplace offline"); }
        }

        async function submitNewRestaurant() {
            const name = document.getElementById('admin-res-name').value;
            const description = document.getElementById('admin-res-desc').value;
            if(!name) return alert("Name required");
            await fetch(`${API.res}/restaurants`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, description })
            });
            alert("Restaurant Created!");
            document.getElementById('admin-res-name').value = '';
            fetchRestaurants();
        }

        async function openRestaurant(id, name) {
            document.getElementById('menu-title').innerText = `${name}`;
            showPage('menu');
            const res = await fetch(`${API.res}/restaurants/${id}/menu`);
            const data = await res.json();
            document.getElementById('menu-grid').innerHTML = data.map(item => `
                <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                    <h3 class="text-xl font-black">${item.name}</h3>
                    <p class="text-gray-400 font-bold">$${item.price}</p>
                    <button onclick='addToCart(${JSON.stringify(item)})' class="mt-8 w-full py-4 border-2 border-orange-500 text-orange-500 rounded-2xl font-black hover:bg-orange-500 hover:text-white transition-all">ADD</button>
                </div>
            `).join('');
        }

        function addToCart(item) {
            cart.push(item);
            document.getElementById('cart-count').innerText = cart.length;
            renderCart();
            alert(`${item.name} added!`);
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-gray-400 font-bold text-center py-10">Cart is empty.</p>';
                document.getElementById('cart-total').innerText = '$0.00';
                return;
            }
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += parseFloat(item.price);
                return `<div class="flex justify-between items-center bg-gray-50 p-6 rounded-2xl">
                    <span class="font-black">${item.name}</span>
                    <button onclick="cart.splice(${index},1); renderCart(); document.getElementById('cart-count').innerText=cart.length;" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        async function checkout() {
            if (!currentUser || cart.length === 0) return alert("Error checking out");
            try {
                for (let item of cart) {
                    await fetch(`${API.order}/orders`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: currentUser.id, itemId: item.id, restaurantId: item.restaurant_id })
                    });
                }
                alert("Order Successful!");
                cart = []; // CRITICAL: Clear cart memory
                document.getElementById('cart-count').innerText = 0; // Clear UI badge
                showPage('home'); // Redirect away from cart
            } catch(e) { alert("Checkout failed"); }
        }

        async function submitItem() {
            const restaurant_id = document.getElementById('admin-res-select').value;
            const name = document.getElementById('admin-item-name').value;
            const price = document.getElementById('admin-item-price').value;
            await fetch(`${API.res}/restaurant/menu`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ restaurant_id, name, price })
            });
            alert("Added!");
            showPage('home');
        }

        function toggleAuth() { isRegister = !isRegister; document.getElementById('auth-title').innerText = isRegister ? 'Register' : 'Sign In'; }
        
        showPage('home');
    </script>
</body>
</html>
