version: '3.8'

services:
  # The Database Service
  db:
    image: postgres:15-alpine
    container_name: food_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: food_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - food-network

  # User Service (Port 3001)
  user-service:
    build: ./user-service
    container_name: user_service
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/food_db
    ports:
      - "3001:3000"
    depends_on:
      - db
      - rabbitmq
    networks:
      - food-network

  # Restaurant Service (Port 3002)
  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant_service
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/food_db
    ports:
      - "3002:3000"
    depends_on:
      - db
      - rabbitmq

    networks:
      - food-network

  # Order Service (Port 3003)
  order-service:
    build: ./order-service
    container_name: order_service
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/food_db
      - RESTAURANT_SERVICE_URL=http://restaurant-service:3000
    ports:
      - "3003:3000"
    depends_on:
      - db
      - restaurant-service
      - rabbitmq
    networks:
      - food-network

  frontend:
    build: ./frontend
    container_name: frontend_service
    ports:
      - "8080:8080"
    networks:
      - food-network
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - rabbitmq
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    networks:
      - food-network
networks:
  food-network:
    driver: bridge